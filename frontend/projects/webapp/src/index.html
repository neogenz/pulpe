<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pulpe</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- External icon font only (text fonts are self-hosted via @fontsource) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <!-- Fallback pour navigateurs sans JS -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet"
      />
    </noscript>
    <script>
      // Apply .dark-theme class before first paint to prevent FOUC.
      // The ThemeService takes over once Angular bootstraps.
      (function () {
        if (matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.classList.add("dark-theme");
        }
      })();
    </script>
  </head>
  <body class="mat-typography">
    <style>
      .pulpe-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f6fbf1;
      }

      @media (prefers-color-scheme: dark) {
        .pulpe-splash {
          background: #10150f;
        }
      }

      .pulpe-splash-braille {
        display: inline-block;
        font-size: 2rem;
        font-family: monospace;
        line-height: 1;
        white-space: nowrap;
        color: #006e25;
      }

      @media (prefers-color-scheme: dark) {
        .pulpe-splash-braille {
          color: #7edb83;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .pulpe-splash-braille {
          animation: none;
        }
      }
    </style>
    <div
      id="pulpe-splash"
      class="pulpe-splash"
      role="status"
      aria-label="Chargement de Pulpe"
    >
      <span id="pulpe-splash-braille" class="pulpe-splash-braille">⠋</span>
    </div>
    <script>
      (function () {
        var frames = ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"];
        var el = document.getElementById("pulpe-splash-braille");
        if (!el || matchMedia("(prefers-reduced-motion: reduce)").matches)
          return;
        var i = 0;
        setInterval(function () {
          i = (i + 1) % frames.length;
          el.textContent = frames[i];
        }, 80);
      })();
    </script>
    <pulpe-root></pulpe-root>
  </body>
</html>
