<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pulpe</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- External icon font only (text fonts are self-hosted via @fontsource) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      id="material-symbols-link"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
      media="print"
    />
    <!-- Fallback pour navigateurs sans JS -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet"
      />
    </noscript>
    <!-- Init scripts (CSP-safe, no inline). theme.js is render-blocking on purpose (pre-paint anti-FOUC); fonts.js only wires a load listener so it can defer. -->
    <script src="init/theme.js"></script>
    <script src="init/fonts.js" defer></script>
  </head>
  <body class="mat-typography">
    <style>
      .pulpe-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f6fbf1;
      }

      @media (prefers-color-scheme: dark) {
        .pulpe-splash {
          background: #10150f;
        }
      }

      .pulpe-splash-braille {
        display: inline-block;
        font-size: 2rem;
        font-family: monospace;
        line-height: 1;
        white-space: nowrap;
        color: #006e25;
      }

      @media (prefers-color-scheme: dark) {
        .pulpe-splash-braille {
          color: #7edb83;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .pulpe-splash-braille {
          animation: none;
        }
      }
    </style>
    <div
      id="pulpe-splash"
      class="pulpe-splash"
      role="status"
      aria-label="Chargement de Pulpe"
    >
      <span id="pulpe-splash-braille" class="pulpe-splash-braille">⠋</span>
    </div>
    <script src="init/splash.js"></script>
    <pulpe-root></pulpe-root>
  </body>
</html>
