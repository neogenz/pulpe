# SwiftLint configuration for Pulpe iOS
# https://github.com/realm/SwiftLint

# Paths to include
included:
  - Pulpe
  - PulpeWidget
  - PulpeTests
  - PulpeUITests

# Paths to exclude
excluded:
  - Pulpe.xcodeproj
  - .build
  - DerivedData

# Rules
disabled_rules:
  - blanket_disable_command # Needed for file_length/type_body_length disables
  - trailing_comma # Personal preference

opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping
  - implicitly_unwrapped_optional
  - modifier_order
  - sorted_imports
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

# Rule configurations
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - k

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# Reporter type (xcode, json, csv, checkstyle, codeclimate, junit, html, emoji, sonarqube, markdown, github-actions-logging, summary)
reporter: xcode
