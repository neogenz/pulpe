name: 🚀 CI Pipeline

on:
  push:
    branches: [main, preview] # Seulement sur les branches principales
  pull_request:
    branches: [main, preview] # Tests sur toutes les PRs vers ces branches

# Éviter les runs multiples pour la même ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Sécurité : permissions minimales
permissions:
  contents: read
  checks: write
  pull-requests: write

# Variables globales
env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.12.1"
  BUN_VERSION: "1.2.17"

jobs:
  # 📦 INSTALL & CACHE
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Configure npm retry settings
        run: |
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 120000
          npm config set fetch-retries 3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm" # Cache pnpm store en backup
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

  # 🗄️ SUPABASE SETUP (Approche officielle 2025)
  supabase-setup:
    name: 🗄️ Setup Supabase Local
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: install
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🗄️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🐳 Start Supabase Local (Optimisé)
        working-directory: backend-nest
        run: |
          echo "🚀 Starting Supabase local instance..."
          # Exclure les services non nécessaires pour gain de performance
          supabase start --exclude studio,inbucket,imgproxy,edge-runtime

          echo "⏳ Health check robuste..."
          timeout=180
          counter=0
          until curl -s http://127.0.0.1:54321/rest/v1/ >/dev/null; do
            if [ $counter -gt $timeout ]; then
              echo "❌ Timeout waiting for Supabase"
              supabase status  # Debug en cas d'échec
              exit 1
            fi
            echo "Waiting for Supabase... ($counter/180s)"
            sleep 1
            counter=$((counter + 1))
          done
          echo "✅ Supabase ready!"

      - name: 🔧 Generate TypeScript Types
        working-directory: backend-nest
        run: |
          echo "📝 Generating TypeScript types from local schema..."
          supabase gen types typescript --local > src/types/database.types.ts
          echo "✅ Types generated"

      - name: 🔧 Setup CI Environment
        working-directory: backend-nest
        run: |
          echo "📝 Creating CI environment file..."
          cp .env.ci .env
          # Get keys dynamically from local Supabase instance
          echo "SUPABASE_URL=$(supabase status -o env 2>/dev/null | grep API_URL | cut -d'=' -f2 | tr -d '\"')" >> .env
          echo "SUPABASE_ANON_KEY=$(supabase status -o env 2>/dev/null | grep ANON_KEY | cut -d'=' -f2 | tr -d '\"')" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env 2>/dev/null | grep SERVICE_ROLE_KEY | cut -d'=' -f2 | tr -d '\"')" >> .env
          # Turnstile verification is skipped in test environment, dummy value is sufficient
          echo "TURNSTILE_SECRET_KEY=ci-test-turnstile-key" >> .env
          echo "ENCRYPTION_MASTER_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" >> .env
          echo "✅ Environment ready"

      - name: 💾 Save Supabase State
        uses: actions/upload-artifact@v5
        with:
          name: supabase-state
          include-hidden-files: true
          path: |
            backend-nest/.env
            backend-nest/src/types/database.types.ts
            backend-nest/supabase/.temp/
          retention-days: 1

  # 🏗️ BUILD (Modifié pour dépendre de supabase-setup)
  build:
    name: 🏗️ Build Projects
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install, supabase-setup]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Configure npm retry settings
        run: |
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 120000
          npm config set fetch-retries 3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🗄️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 📥 Download Supabase State
        uses: actions/download-artifact@v5
        with:
          name: supabase-state
          path: backend-nest/

      - name: 🐳 Restore Supabase
        working-directory: backend-nest
        run: |
          supabase start --exclude studio,inbucket,imgproxy,edge-runtime

          # Health check rapide pour restore
          timeout=60
          counter=0
          until curl -s http://127.0.0.1:54321/rest/v1/ >/dev/null; do
            if [ $counter -gt $timeout ]; then
              echo "❌ Failed to restore Supabase"
              exit 1
            fi
            sleep 1
            counter=$((counter + 1))
          done
          echo "✅ Supabase restored"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build all projects
        env:
          DOTENV_CONFIG_PATH: .env.e2e
        run: pnpm build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-artifacts
          path: |
            shared/dist/
            frontend/dist/
            backend-nest/dist/
          retention-days: 1

  # 🧪 TESTS UNITAIRES (Modifié pour utiliser Supabase local)
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install, build]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Configure npm retry settings
        run: |
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 120000
          npm config set fetch-retries 3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🗄️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 📥 Download Supabase State
        uses: actions/download-artifact@v5
        with:
          name: supabase-state
          path: backend-nest/

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts

      - name: 🐳 Start Supabase for Tests
        id: start-supabase-tests
        working-directory: backend-nest
        run: |
          supabase start --exclude studio,inbucket,imgproxy,edge-runtime

          # Health check pour tests
          timeout=60
          counter=0
          until curl -s http://127.0.0.1:54321/rest/v1/ >/dev/null; do
            if [ $counter -gt $timeout ]; then
              echo "❌ Supabase not ready for tests"
              exit 1
            fi
            sleep 1
            counter=$((counter + 1))
          done
          echo "✅ Supabase ready for tests"

          # Export local Supabase keys as outputs (using heredoc for robust special character handling)
          {
            echo 'SUPABASE_URL<<EOF'
            supabase status -o env 2>/dev/null | grep API_URL | cut -d'=' -f2 | tr -d '\"'
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          {
            echo 'SUPABASE_ANON_KEY<<EOF'
            supabase status -o env 2>/dev/null | grep ANON_KEY | cut -d'=' -f2 | tr -d '\"'
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          {
            echo 'SUPABASE_SERVICE_ROLE_KEY<<EOF'
            supabase status -o env 2>/dev/null | grep SERVICE_ROLE_KEY | cut -d'=' -f2 | tr -d '\"'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests
        run: pnpm test:unit
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ steps.start-supabase-tests.outputs.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ steps.start-supabase-tests.outputs.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.start-supabase-tests.outputs.SUPABASE_SERVICE_ROLE_KEY }}
          TURNSTILE_SECRET_KEY: ci-test-turnstile-key
          ENCRYPTION_MASTER_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: 🧹 Cleanup Supabase
        if: always() && steps.start-supabase-tests.outcome == 'success'
        working-directory: backend-nest
        run: supabase stop || true

  # 🎭 E2E TESTS (Chromium only - matching playwright.config.ts projects)
  test-e2e:
    name: 🎭 E2E Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [install, build]
    strategy:
      fail-fast: false
      matrix:
        project:
          - "Critical User Journeys (Mocked)"
          - "Feature Tests (Mocked)"
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Configure npm retry settings
        run: |
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 120000
          npm config set fetch-retries 3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts

      - name: 🎭 Install Playwright (Chromium only)
        run: cd frontend && pnpm exec playwright install chromium --with-deps

      - name: 🎭 Run E2E tests
        run: cd frontend && pnpm test:e2e --project="${{ matrix.project }}"

      - name: 📊 Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: frontend/test-results/junit.xml
          check_name: E2E Test Results - ${{ matrix.project }}
          comment_title: 🎭 Playwright E2E Tests

      - name: 📤 Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # 🔍 QUALITY CHECKS en parallèle
  quality:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install, build]
    strategy:
      matrix:
        check: [lint, format:check, quality, deps:check]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Configure npm retry settings
        run: |
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 120000
          npm config set fetch-retries 3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Configure npm retry settings
        run: |
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 120000
          npm config set fetch-retries 3

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run ${{ matrix.check }}
        run: pnpm ${{ matrix.check }}

  # 🧪 TESTS PERFORMANCE (backend uniquement)
  test-performance:
    name: 🚀 Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install, build]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Configure npm retry settings
        run: |
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 120000
          npm config set fetch-retries 3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🗄️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 📥 Download Supabase State
        uses: actions/download-artifact@v5
        with:
          name: supabase-state
          path: backend-nest/

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts

      - name: 🐳 Start Supabase for Performance Tests
        id: start-supabase-performance
        working-directory: backend-nest
        run: |
          supabase start --exclude studio,inbucket,imgproxy,edge-runtime

          # Health check pour tests
          timeout=60
          counter=0
          until curl -s http://127.0.0.1:54321/rest/v1/ >/dev/null; do
            if [ $counter -gt $timeout ]; then
              echo "❌ Supabase not ready for tests"
              exit 1
            fi
            sleep 1
            counter=$((counter + 1))
          done
          echo "✅ Supabase ready for performance tests"

          # Export local Supabase keys as outputs (using heredoc for robust special character handling)
          {
            echo 'SUPABASE_URL<<EOF'
            supabase status -o env 2>/dev/null | grep API_URL | cut -d'=' -f2 | tr -d '\"'
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          {
            echo 'SUPABASE_ANON_KEY<<EOF'
            supabase status -o env 2>/dev/null | grep ANON_KEY | cut -d'=' -f2 | tr -d '\"'
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          {
            echo 'SUPABASE_SERVICE_ROLE_KEY<<EOF'
            supabase status -o env 2>/dev/null | grep SERVICE_ROLE_KEY | cut -d'=' -f2 | tr -d '\"'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🚀 Run performance tests
        run: pnpm test:performance
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ steps.start-supabase-performance.outputs.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ steps.start-supabase-performance.outputs.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.start-supabase-performance.outputs.SUPABASE_SERVICE_ROLE_KEY }}
          TURNSTILE_SECRET_KEY: ci-test-turnstile-key
          ENCRYPTION_MASTER_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: 🧹 Cleanup Supabase
        if: always() && steps.start-supabase-performance.outcome == 'success'
        working-directory: backend-nest
        run: supabase stop || true

  # 🍎 iOS UNIT TESTS
  test-ios:
    name: 🍎 iOS Unit Tests
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: 📦 Install XcodeGen
        run: brew install xcodegen

      - name: 💾 Cache SPM packages
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('ios/project.yml') }}
          restore-keys: spm-

      - name: 🔨 Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: 📱 Resolve iOS Simulator
        id: sim
        run: |
          # Pick the first available iPhone 17 (iOS 26.2) — avoids duplicate-name ambiguity
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          for rt, devs in json.load(sys.stdin)['devices'].items():
            if '26-2' in rt:
              for d in devs:
                if d['name'] == 'iPhone 17':
                  print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: 🧪 Run Unit Tests
        working-directory: ios
        env:
          NSUnbufferedIO: "YES"
        run: |
          # Workaround: xcodebuild hangs after tests on Xcode 26+ (actions/runner-images#13143)
          touch test-output.log
          xcodebuild test \
            -scheme PulpeTests \
            -destination 'id=${{ steps.sim.outputs.udid }}' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults \
            -parallel-testing-enabled NO \
            -collect-test-diagnostics never \
            >> test-output.log 2>&1 &
          XCODE_PID=$!

          # Live filtered output
          tail -f test-output.log | grep --line-buffered -E '(✔|✘|Test Case|passed|failed|error:|Suite|TEST SUCCEEDED|TEST FAILED)' &
          TAIL_PID=$!

          # Wait for test completion or timeout (13 min — leaves 2 min buffer for 15 min step timeout)
          ELAPSED=0
          while kill -0 $XCODE_PID 2>/dev/null && [ $ELAPSED -lt 780 ]; do
            if grep -q '\*\* TEST SUCCEEDED \*\*\|\*\* TEST FAILED \*\*' test-output.log 2>/dev/null; then
              echo "📋 Tests finished, cleaning up xcodebuild..."
              sleep 5
              break
            fi
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          kill $TAIL_PID 2>/dev/null || true
          kill $XCODE_PID 2>/dev/null || true

          if grep -q '\*\* TEST SUCCEEDED \*\*' test-output.log; then
            echo "✅ All tests passed"
            exit 0
          elif grep -q '\*\* TEST FAILED \*\*' test-output.log; then
            echo "❌ Tests failed"
            exit 1
          elif grep -q '✘' test-output.log; then
            echo "❌ Test failures detected (✘ found in output)"
            exit 1
          elif grep -q '✔' test-output.log && ! grep -q '✘' test-output.log; then
            PASS_COUNT=$(grep -c '✔' test-output.log || echo 0)
            echo "⚠️ xcodebuild hung before writing summary — ${PASS_COUNT} tests passed, no failures detected"
            if [ "$PASS_COUNT" -lt 50 ]; then  # ~120 tests currently — 50 catches partial runs
              echo "❌ Too few tests passed (${PASS_COUNT}) — likely hung before completing suite"
              exit 1
            fi
            exit 0
          else
            echo "⚠️ Could not determine test outcome"
            tail -30 test-output.log
            exit 1
          fi

      - name: 📋 Show failed tests (if any)
        if: failure()
        working-directory: ios
        run: |
          echo "=== FAILED TESTS ==="
          grep -E "(Test Case.*failed|✘|error:)" test-output.log || echo "No explicit failures found"
          echo "=== LAST 50 LINES ==="
          tail -50 test-output.log

      - name: 🧹 Cleanup Simulator
        if: always()
        run: xcrun simctl shutdown all 2>/dev/null || true

  # 🗄️ MIGRATION DRY-RUN (PRs only — détecte les problèmes avant merge)
  migrate-dryrun:
    name: 🗄️ Migration Dry-Run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🗄️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔗 Link Supabase Project
        working-directory: backend-nest
        run: supabase link --project-ref $SUPABASE_PROJECT_ID
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}

      - name: 🧪 Dry-Run Migrations
        working-directory: backend-nest
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

  # ✅ SUCCESS JOB pour status checks
  ci-success:
    name: ✅ CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [build, test-unit, test-e2e, quality, test-performance, test-ios, migrate-dryrun]
    if: always()
    steps:
      - name: ✅ Check all jobs
        if: >-
          needs.build.result == 'success' &&
          needs.test-unit.result == 'success' &&
          needs.test-e2e.result == 'success' &&
          needs.quality.result == 'success' &&
          needs.test-performance.result == 'success' &&
          needs.test-ios.result == 'success' &&
          contains(fromJSON('["success", "skipped"]'), needs.migrate-dryrun.result)
        run: echo "🎉 All CI checks passed!"

      - name: ❌ Check failures
        if: >-
          needs.build.result != 'success' ||
          needs.test-unit.result != 'success' ||
          needs.test-e2e.result != 'success' ||
          needs.quality.result != 'success' ||
          needs.test-performance.result != 'success' ||
          needs.test-ios.result != 'success' ||
          !contains(fromJSON('["success", "skipped"]'), needs.migrate-dryrun.result)
        run: |
          echo "❌ Some CI checks failed"
          echo "Build: ${{ needs.build.result }}"
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "E2E Tests: ${{ needs.test-e2e.result }}"
          echo "Quality: ${{ needs.quality.result }}"
          echo "Performance: ${{ needs.test-performance.result }}"
          echo "iOS Tests: ${{ needs.test-ios.result }}"
          echo "Migration Dry-Run: ${{ needs.migrate-dryrun.result }}"
          exit 1

  # 🗄️ MIGRATION PRODUCTION (push main only — applique les migrations après CI verte)
  migrate:
    name: 🗄️ Apply Migrations (Production)
    if: always() && needs.ci-success.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci-success]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🗄️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔗 Link Supabase Project
        working-directory: backend-nest
        run: supabase link --project-ref $SUPABASE_PROJECT_ID
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}

      - name: 🚀 Push Migrations
        working-directory: backend-nest
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
