# Lefthook configuration for Pulpe monorepo
# https://github.com/evilmartians/lefthook

pre-commit:
  commands:
    quality:
      run: pnpm run quality --filter="...[HEAD^]"
      skip:
        - merge
        - rebase
      env:
        LEFTHOOK: 1

    swiftlint:
      glob: "ios/**/*.swift"
      run: |
        cd ios && swiftlint lint --strict --quiet {staged_files}
      skip:
        - merge
        - rebase
